# ============================================================
# BPSC RPM - Development Docker Compose
# ============================================================
# Usage: docker compose -f docker-compose.dev.yml up
# 
# This spins up only the PostgreSQL database.
# Run backend and frontend locally for hot-reload:
#   cd backend && npm run dev
#   cd frontend && npm run dev
# ============================================================
version: "3.9"

services:
  # PostgreSQL Database (development)
  db:
    image: postgres:16-alpine
    container_name: bpsc-rpm-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: bpsc_rpm
      POSTGRES_USER: bpsc_admin
      POSTGRES_PASSWORD: bpsc_secure_password_2026
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpsc_admin -d bpsc_rpm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bpsc-rpm-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bpsc.gov.bd
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
